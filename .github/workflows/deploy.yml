name: Deploy MkDocs to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install MkDocs
        run: pip install "mkdocs<2" mkdocs-material
      - name: Deploy
        run: mkdocs gh-deploy --force
        working-directory: ./05_export
